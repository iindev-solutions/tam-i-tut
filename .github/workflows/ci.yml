name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  frontend-quality:
    name: Frontend Lint / Typecheck / Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install frontend dependencies
        run: npm --prefix frontend install

      - name: Frontend lint
        run: npm --prefix frontend run lint

      - name: Frontend typecheck
        run: npm --prefix frontend run typecheck

      - name: Frontend tests
        run: npm --prefix frontend run test

  database-quality:
    name: Supabase Lint / RLS pgTAP
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Verify Docker
        run: docker version

      - name: Start Supabase local stack
        run: npx -y supabase start --exclude studio,imgproxy,kong,mailpit,edge-runtime,logflare,vector,supavisor

      - name: Apply migrations
        run: npx -y supabase migration up --local

      - name: Lint database schema
        run: npx -y supabase db lint --local --fail-on error

      - name: Run RLS pgTAP suite
        run: npx -y supabase test db supabase/tests/rls --local

      - name: Stop Supabase local stack
        if: always()
        run: npx -y supabase stop
